name: Build Trading APK
on: [push]

env:
  # Opt into Node.js 24 to future-proof the runner
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Download your repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java 17 (Required for Android 34)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. Create the Gradle Wrapper and Build
      # We force Gradle 8.5 to fix the 'HasConvention' error
      - name: Build with Gradle
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      # 4. Upload the generated APK for you to download
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradingBot-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
