name: Build Trading APK
on: [push]

env:
  # Opt into Node.js 24 as per GitHub recommendation
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - uses: actions/checkout@v4
      
      # Set up Java 17 (Required for Android 34)
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      # Generate Gradle Wrapper if missing and Build
      - name: Build with Gradle
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
      # Upload the final APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TradingBot-APK
          path: app/build/outputs/apk/debug/app-debug.apk
